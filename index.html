<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vocabulario 3D</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#030712;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#app{position:relative;width:100vw;height:100vh;overflow:hidden;background:radial-gradient(circle at 50% 18%,rgba(0,229,255,.18),transparent 34%),radial-gradient(circle at 18% 78%,rgba(124,58,237,.20),transparent 38%),linear-gradient(180deg,#07111f,#030712 72%);perspective:900px}
.room{position:absolute;inset:0}
.wall{position:absolute;left:50%;top:50%;width:min(92vw,1050px);height:min(68vh,620px);transform:translate(-50%,-50%);border:1px solid rgba(0,229,255,.22);border-radius:34px;background:linear-gradient(135deg,rgba(255,255,255,.045),rgba(255,255,255,.01)),radial-gradient(circle at 50% 45%,rgba(0,229,255,.12),transparent 42%);box-shadow:0 0 80px rgba(0,229,255,.12),inset 0 0 70px rgba(124,58,237,.09)}
.wall:before{content:"";position:absolute;inset:0;border-radius:34px;opacity:.36;background-image:linear-gradient(rgba(0,229,255,.16) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.16) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(circle at center,black 0 48%,transparent 82%)}
.floor{position:absolute;left:50%;bottom:-15vh;width:126vw;height:48vh;transform:translateX(-50%) rotateX(72deg);transform-origin:top center;background:linear-gradient(rgba(0,229,255,.16) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.13) 1px,transparent 1px),linear-gradient(180deg,rgba(0,229,255,.10),rgba(3,7,18,.82));background-size:54px 54px,54px 54px,100% 100%;border-top:1px solid rgba(0,229,255,.26)}
.scan{position:absolute;left:10%;right:10%;height:2px;top:50%;background:linear-gradient(90deg,transparent,#00e5ff,#7c3aed,transparent);box-shadow:0 0 26px rgba(0,229,255,.65);animation:scan 7s ease-in-out infinite alternate}
@keyframes scan{from{transform:translateY(-130px);opacity:.18}to{transform:translateY(130px);opacity:.6}}

.figure{position:absolute;left:50%;top:58%;width:130px;height:196px;transform:translate(-50%,-50%);z-index:3;opacity:.62;filter:drop-shadow(0 0 34px rgba(0,229,255,.16));transition:transform 3s cubic-bezier(.65,0,.2,1)}
.figure.turn{transform:translate(-50%,-50%) rotateY(180deg)}
.head{position:absolute;left:50%;top:0;width:84px;height:108px;transform:translateX(-50%);border-radius:48% 48% 44% 44%;background:radial-gradient(circle at 34% 18%,rgba(255,255,255,.58),rgba(223,251,255,.30) 30%,rgba(56,189,248,.14) 60%,rgba(15,23,42,.46) 100%),linear-gradient(135deg,rgba(247,253,255,.38),rgba(56,189,248,.14));border:1px solid rgba(0,229,255,.16);box-shadow:inset -14px -18px 28px rgba(15,23,42,.22),inset 12px 14px 26px rgba(255,255,255,.06),0 0 32px rgba(0,229,255,.09)}
.eye{position:absolute;top:42px;width:7px;height:5px;border-radius:999px;background:rgba(224,242,254,.8);box-shadow:0 0 8px rgba(0,229,255,.65)}
.eyeL{left:25px}.eyeR{right:25px}
.nose{position:absolute;left:50%;top:52px;width:6px;height:15px;transform:translateX(-50%);border-radius:50%;background:rgba(0,229,255,.13);border-right:1px solid rgba(0,229,255,.20)}
.mouth{position:absolute;left:50%;top:77px;width:24px;height:7px;transform:translateX(-50%);border-bottom:1px solid rgba(224,242,254,.42);border-radius:0 0 999px 999px}
.figure .eye,.figure .nose,.figure .mouth{transition:opacity 2.1s ease}.figure.turn .eye,.figure.turn .nose,.figure.turn .mouth{opacity:.04}
.neck{position:absolute;left:50%;top:96px;width:34px;height:46px;transform:translateX(-50%);border-radius:16px;background:linear-gradient(180deg,rgba(223,251,255,.24),rgba(56,189,248,.10));opacity:.46}
.shoulders{position:absolute;left:50%;top:132px;width:150px;height:62px;transform:translateX(-50%);border-radius:58px 58px 22px 22px;background:linear-gradient(135deg,rgba(223,251,255,.20),rgba(0,229,255,.08),rgba(124,58,237,.16));border:1px solid rgba(0,229,255,.12)}

#orb{position:absolute;left:50%;top:50%;width:28px;height:28px;border-radius:50%;z-index:5;transform:translate(-50%,-50%);background:#00e5ff;box-shadow:0 0 18px #00e5ff,0 0 54px rgba(0,229,255,.95),0 0 120px rgba(124,58,237,.72);transition:left 2.6s cubic-bezier(.22,1,.36,1),top 2.6s cubic-bezier(.22,1,.36,1),opacity .5s ease;animation:thetaBreath 2.8s ease-in-out infinite}
#orb:after{content:"";position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,.26),transparent 66%)}
#orb.blink{animation:blink .24s ease-in-out 2,thetaBreath 2.8s ease-in-out infinite}
@keyframes blink{0%,100%{filter:brightness(1)}50%{filter:brightness(3.1)}}
@keyframes thetaBreath{0%,100%{scale:1;opacity:.9}50%{scale:1.14;opacity:1}}

#pulseRing{position:absolute;left:50%;top:50%;width:36px;height:36px;border-radius:50%;z-index:4;pointer-events:none;opacity:0;transform:translate(-50%,-50%) scale(.65);border:1px solid rgba(0,229,255,.75);box-shadow:0 0 26px rgba(0,229,255,.55),0 0 70px rgba(124,58,237,.36)}
#pulseRing.fire{animation:pulse .72s ease-out both}@keyframes pulse{0%{opacity:.9;transform:translate(-50%,-50%) scale(.7)}100%{opacity:0;transform:translate(-50%,-50%) scale(4.2)}}

#word{position:absolute;left:50%;top:44%;z-index:9;transform:translate(-50%,-50%);max-width:76vw;line-height:1.08;text-align:center;pointer-events:none;color:#f5f3ff;font-weight:850;font-size:clamp(24px,4.1vw,56px);letter-spacing:.08em;text-transform:uppercase;opacity:0;visibility:hidden;text-shadow:0 0 8px rgba(245,243,255,.9),0 0 24px rgba(124,58,237,.58),0 0 58px rgba(0,229,255,.24);transition:opacity .8s ease,left 2.6s cubic-bezier(.22,1,.36,1),top 2.6s cubic-bezier(.22,1,.36,1)}
#word.visible{opacity:1;visibility:visible}#word.english{color:#ede9fe;text-shadow:0 0 8px rgba(255,255,255,.95),0 0 28px rgba(0,229,255,.82),0 0 70px rgba(124,58,237,.60)}

#hint{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(235,250,255,.92);letter-spacing:.16em;font-size:12px;text-transform:uppercase;white-space:nowrap;padding:10px 16px;border-radius:999px;border:1px solid rgba(0,229,255,.26);background:rgba(2,8,23,.42);backdrop-filter:blur(18px)}
#progress{position:absolute;right:24px;top:22px;z-index:10;color:rgba(235,250,255,.72);font-size:12px;letter-spacing:.16em;padding:10px 14px;border-radius:999px;border:1px solid rgba(0,229,255,.18);background:rgba(2,8,23,.34);backdrop-filter:blur(16px)}
#panMeter{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:12px;color:rgba(235,250,255,.82);font-size:12px;letter-spacing:.15em;padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(2,8,23,.46);backdrop-filter:blur(18px)}
#track{width:min(44vw,300px);height:4px;position:relative;border-radius:999px;background:linear-gradient(90deg,rgba(124,58,237,.64),rgba(0,229,255,.86),rgba(124,58,237,.64))}
#panDot{position:absolute;top:50%;left:50%;width:17px;height:17px;border-radius:50%;transform:translate(-50%,-50%);background:#00e5ff;box-shadow:0 0 20px #00e5ff,0 0 58px rgba(0,229,255,.86),0 0 90px rgba(124,58,237,.55);transition:left .08s linear}
#matrixCanvas{position:absolute;inset:0;z-index:7;pointer-events:none;opacity:0;transition:opacity .35s ease}#matrixCanvas.on{opacity:1}

#splash{position:absolute;inset:0;z-index:30;display:grid;place-items:center;background:radial-gradient(circle at center,rgba(0,229,255,.16),rgba(3,7,18,.96) 57%,#01030a 100%)}
#splash:before,#splash:after{content:"";position:absolute;inset:-20%;background-image:radial-gradient(circle,rgba(0,229,255,.55) 0 1px,transparent 2px),radial-gradient(circle,rgba(124,58,237,.45) 0 1px,transparent 2px);background-size:130px 130px,190px 190px;animation:drift 18s linear infinite;opacity:.45}
#splashCard{position:relative;z-index:2;width:min(92vw,710px);padding:56px 34px;text-align:center;border-radius:34px;border:1px solid rgba(0,229,255,.22);background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.035));backdrop-filter:blur(30px);box-shadow:0 35px 120px rgba(0,0,0,.62),0 0 80px rgba(0,229,255,.12),inset 0 1px 0 rgba(255,255,255,.18)}
#eyebrow{margin:0 0 16px;color:#00e5ff;letter-spacing:.38em;font-size:12px}
h1{margin:0;color:#f5fdff;font-size:clamp(42px,8vw,82px);letter-spacing:.16em;text-shadow:0 0 38px rgba(0,229,255,.42)}
#subtitle{color:rgba(235,250,255,.86);font-size:clamp(16px,2.2vw,22px);margin:20px 0 34px;letter-spacing:.08em}
#startBtn,#restartBtn{appearance:none;border:1px solid rgba(0,229,255,.78);background:linear-gradient(135deg,rgba(0,229,255,.16),rgba(124,58,237,.16));color:#e8fbff;font-weight:900;font-size:15px;letter-spacing:.2em;border-radius:999px;padding:16px 34px;cursor:pointer;box-shadow:0 0 36px rgba(0,229,255,.26),inset 0 0 22px rgba(255,255,255,.05);touch-action:manipulation}
#splash.hidden{pointer-events:none;opacity:0;transition:opacity .75s ease}
#finishScreen{position:absolute;inset:0;z-index:25;display:grid;place-items:center;pointer-events:none;opacity:0;background:radial-gradient(circle at center,rgba(0,229,255,.16),rgba(3,7,18,.88) 60%,rgba(1,3,10,.96));transition:opacity .8s ease}
#finishScreen.show{opacity:1;pointer-events:auto}
#finishCard{width:min(90vw,560px);padding:46px 28px;text-align:center;border-radius:32px;border:1px solid rgba(0,229,255,.26);background:linear-gradient(135deg,rgba(255,255,255,.14),rgba(255,255,255,.04));backdrop-filter:blur(28px);box-shadow:0 35px 110px rgba(0,0,0,.6),0 0 75px rgba(0,229,255,.16)}
#finishCard p{margin:0 0 14px;color:#00e5ff;font-size:12px;letter-spacing:.34em}#finishCard h2{margin:0 0 26px;color:#f5fdff;font-size:clamp(34px,6vw,62px);letter-spacing:.05em}
@keyframes drift{to{transform:translate3d(90px,140px,0)}}
@media(max-width:650px){#hint{top:14px;font-size:10px;padding:8px 12px}#progress{top:60px;right:14px}h1{letter-spacing:.08em}#splashCard{padding:42px 22px;border-radius:26px}#panMeter{bottom:16px}#track{width:58vw}.figure{width:110px;height:166px}#word{font-size:clamp(22px,7vw,42px);max-width:84vw}}
</style>
</head>
<body>
<div id="app">
<div class="room"><div class="wall"><div class="scan"></div></div><div class="floor"></div></div>
<div class="figure" id="figure"><div class="head"><div class="eye eyeL"></div><div class="eye eyeR"></div><div class="nose"></div><div class="mouth"></div></div><div class="neck"></div><div class="shoulders"></div></div>
<div id="pulseRing"></div><div id="orb"></div><div id="word"></div><canvas id="matrixCanvas"></canvas>
<div id="hint">Sigue el punto · Usa audífonos</div><div id="progress">0 / 50 · THETA MODE</div>
<div id="panMeter"><span>L</span><div id="track"><i id="panDot"></i></div><span>R</span></div>
<div id="finishScreen"><div id="finishCard"><p>SESIÓN COMPLETADA</p><h2>Excelente práctica</h2><button id="restartBtn" type="button">REPETIR</button></div></div>
<div id="splash"><div id="splashCard"><p id="eyebrow">NEUROSPATIAL LEARNING</p><h1>VOCABULARIO 3D</h1><p id="subtitle">Sigue el punto · Usa audífonos<br><span style="font-size:12px;opacity:.72;letter-spacing:.05em">En celular, toca INICIAR una vez y sube el volumen multimedia.</span></p><button id="startBtn" type="button">▶ INICIAR</button></div></div>
</div>

<script>
const VOCABULARY=[["Yield","ceder el paso"],["Lane","carril"],["Crosswalk","cruce peatonal"],["Pedestrian","peatón"],["Shoulder","acotamiento"],["Headlights","faros"],["Taillights","luces traseras"],["Windshield","parabrisas"],["Seatbelt","cinturón de seguridad"],["Brake","freno"],["Steering wheel","volante"],["Speed limit","límite de velocidad"],["Merge","incorporarse"],["Pass","rebasar"],["Detour","desvío"],["Slippery","resbaloso"],["Skid","derrape"],["Tailgating","seguir muy de cerca"],["Honk","tocar el claxon"],["Bumper","defensa"],["Hood","cofre"],["Trunk","cajuela"],["Wiper","limpiaparabrisas"],["Rearview mirror","espejo retrovisor"],["Blind spot","punto ciego"],["Curb","banqueta"],["Intersection","intersección"],["Four-way stop","alto de cuatro vías"],["Freeway","autopista"],["Ramp","rampa"],["Reckless","imprudente"],["Drowsy","somnoliento"],["Swerve","virar bruscamente"],["Stall","apagarse el motor"],["Tread","dibujo de la llanta"],["Blowout","reventón de llanta"],["School zone","zona escolar"],["Work zone","zona de construcción"],["Railroad crossing","cruce ferroviario"],["Deer crossing","cruce de venados"],["Flashing lights","luces intermitentes"],["Right-of-way","derecho de paso"],["Pull over","orillarse"],["U-turn","vuelta en U"],["Back up","retroceder"],["Turn signal","direccional"],["License plate","placa"],["Ticket","multa"],["Tow truck","grúa"],["Crash","choque"]];
const $=id=>document.getElementById(id),splash=$("splash"),startBtn=$("startBtn"),restartBtn=$("restartBtn"),figure=$("figure"),orb=$("orb"),word=$("word"),panDot=$("panDot"),progressEl=$("progress"),finishScreen=$("finishScreen"),pulseRing=$("pulseRing"),matrixCanvas=$("matrixCanvas");
let started=false,running=false,audio=null,voices=[],sequence=shuffle(VOCABULARY),idx=0,current={x:50,y:50,z:0},target={x:50,y:50,z:0},predict=0,mouseX=.5,mouseY=.5,animating=false;
target=randomPosition();
loadVoices();if("speechSynthesis"in window){speechSynthesis.onvoiceschanged=loadVoices;setTimeout(loadVoices,500);setTimeout(loadVoices,1500)}
window.addEventListener("mousemove",e=>{mouseX=e.clientX/innerWidth;mouseY=e.clientY/innerHeight});
startBtn.onclick=startExperience;startBtn.onpointerdown=startExperience;restartBtn.onclick=restartExperience;restartBtn.onpointerdown=restartExperience;

function unlockMobileSpeech(){
  if(!("speechSynthesis" in window)) return;

  try{
    speechSynthesis.cancel();

    // Mobile Safari/Chrome often require speech to be initialized directly
    // from the first user tap. This tiny utterance unlocks later voices.
    const unlock = new SpeechSynthesisUtterance(".");
    unlock.lang = "en-US";
    unlock.volume = 0.01;
    unlock.rate = 1;
    unlock.pitch = 1;

    speechSynthesis.speak(unlock);

    setTimeout(()=>loadVoices(),250);
    setTimeout(()=>loadVoices(),900);
  }catch(e){}
}

function startExperience(e){if(e)e.preventDefault();unlockMobileSpeech();if(running)return;running=true;started=true;startBtn.disabled=true;startBtn.textContent="INICIANDO...";splash.classList.add("hidden");setTimeout(()=>splash.style.display="none",760);setTimeout(()=>figure.classList.add("turn"),2500);try{initAudio();if(audio&&audio.ctx&&audio.ctx.state==="suspended")audio.ctx.resume().catch(()=>{})}catch(err){console.warn(err)}if(!animating){animating=true;animate()}runLoop()}
function restartExperience(e){if(e)e.preventDefault();finishScreen.classList.remove("show");sequence=shuffle(VOCABULARY);idx=0;predict=0;started=true;running=true;progressEl.textContent="0 / 50 · THETA MODE";runLoop()}
function animate(){current.x+=(target.x-current.x)*.034;current.y+=(target.y-current.y)*.034;current.z+=(target.z-current.z)*.034;const behind=current.z<-70,scale=Math.max(.55,Math.min(1.55,1+current.z*.0036));orb.style.left=current.x+"vw";orb.style.top=current.y+"vh";orb.style.transform=`translate(-50%,-50%) scale(${scale})`;orb.style.opacity=behind?.72:1;pulseRing.style.left=current.x+"vw";pulseRing.style.top=current.y+"vh";word.style.left=Math.max(18,Math.min(82,current.x))+"vw";word.style.top=Math.max(28,Math.min(68,current.y-8))+"vh";const pan=(current.x-50)/50;panDot.style.left=(50+Math.max(-1,Math.min(1,pan))*45)+"%";updateAudio(pan,current.z);requestAnimationFrame(animate)}
async function runLoop(){await wait(3200);while(started&&idx<sequence.length){const item=sequence[idx];idx++;progressEl.textContent=idx+" / "+sequence.length+" · THETA MODE";target=randomPosition();blip();await wait(2600);showWord(item[1],"spanish");await wait(2300);hideWord();await wait(520);await blinkOrbTwice();doubleEnglishBeep();hapticCue();showWord(item[0],"english");await wait(560);setVoiceMode(true);await wait(160);await speak(item[0],"en-US",.72,1.02);await wait(260);await speak(item[1],"es-MX",.78,1);await wait(220);setVoiceMode(false);await wait(1050);hideWord();if(idx%5===0)matrix(item[0]);await wait(700)}started=false;running=false;finishScreen.classList.add("show")}
function randomPosition(){predict++;let side=predict%5===0?"behind":predict%2===0?"right":"left";let x=50,y=48,z=0;if(side==="left"){x=27+Math.random()*10;z=-20+Math.random()*120}else if(side==="right"){x=63+Math.random()*10;z=-20+Math.random()*120}else{x=50+(Math.random()*12-6);z=-150+Math.random()*28}x+=(mouseX-.5)*6;y+=(mouseY-.5)*4;return{x:Math.max(18,Math.min(82,x)),y:Math.max(26,Math.min(72,y)),z:z}}
function showWord(t,p){word.textContent=t;word.style.visibility="visible";word.className="visible"+(p==="english"?" english":"")}
function hideWord(){word.className=""}
function visualPulse(){pulseRing.classList.remove("fire");void pulseRing.offsetWidth;pulseRing.classList.add("fire")}
function blinkOrbTwice(){return new Promise(r=>{orb.classList.remove("blink");void orb.offsetWidth;orb.classList.add("blink");setTimeout(r,520)})}
function hapticCue(){if(!navigator.vibrate)return;if(target.x<45)navigator.vibrate([30,20,30]);else if(target.x>55)navigator.vibrate([70]);else navigator.vibrate([20,40,20,40,20])}
function wait(ms){return new Promise(r=>setTimeout(r,ms))}
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function loadVoices(){if("speechSynthesis"in window)voices=speechSynthesis.getVoices()||[]}
function pickVoice(lang){loadVoices();const l=lang.toLowerCase();if(l.startsWith("es"))return voices.find(v=>/Paulina|Monica|Marisol|Sabina|Paloma|Dalia|Google español|Español/i.test(v.name)&&v.lang.toLowerCase().startsWith("es"))||voices.find(v=>v.lang.toLowerCase().startsWith("es-mx"))||voices.find(v=>v.lang.toLowerCase().startsWith("es-es"))||voices.find(v=>v.lang.toLowerCase().startsWith("es"))||null;return voices.find(v=>/Samantha|Ava|Victoria|Allison|Jenny|Google US English|English Female/i.test(v.name)&&v.lang.toLowerCase().startsWith("en"))||voices.find(v=>v.lang.toLowerCase().startsWith("en-us"))||voices.find(v=>v.lang.toLowerCase().startsWith("en"))||null}
function speak(text,lang,rate,pitch){
  return new Promise(resolve=>{
    if(!("speechSynthesis" in window)){
      setTimeout(resolve,900);
      return;
    }

    try{
      speechSynthesis.cancel();
      if(speechSynthesis.paused) speechSynthesis.resume();
    }catch(e){}

    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;
    u.rate=rate;
    u.pitch=pitch;
    u.volume=1;

    const v=pickVoice(lang);
    if(v) u.voice=v;

    let done=false;
    const fin=()=>{
      if(!done){
        done=true;
        resolve();
      }
    };

    u.onend=fin;
    u.onerror=fin;

    // Small delay helps mobile browsers after audio context activity.
    setTimeout(()=>{
      try{
        speechSynthesis.resume();
        speechSynthesis.speak(u);
      }catch(e){
        fin();
      }
    },120);

    // Mobile fallback so the sequence never freezes.
    setTimeout(fin,Math.max(1700,text.length*210));
  });
}
function initAudio(){if(audio)return audio;const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;const ctx=new AC(),master=ctx.createGain();master.gain.value=.18;const panner=ctx.createStereoPanner?ctx.createStereoPanner():null;if(panner){master.connect(panner);panner.connect(ctx.destination)}else master.connect(ctx.destination);function brown(){const len=ctx.sampleRate*2,b=ctx.createBuffer(1,len,ctx.sampleRate),d=b.getChannelData(0);let last=0;for(let i=0;i<len;i++){const white=Math.random()*2-1;last=(last+.02*white)/1.02;d[i]=last*4.2}const s=ctx.createBufferSource();s.buffer=b;s.loop=true;return s}const leftNoise=brown(),rightNoise=brown(),movingNoise=brown(),leftGain=ctx.createGain(),rightGain=ctx.createGain(),movingGain=ctx.createGain(),leftPan=ctx.createStereoPanner?ctx.createStereoPanner():null,rightPan=ctx.createStereoPanner?ctx.createStereoPanner():null,movingPan=ctx.createStereoPanner?ctx.createStereoPanner():null;leftGain.gain.value=.018;rightGain.gain.value=.016;movingGain.gain.value=.018;if(leftPan)leftPan.pan.value=-.85;if(rightPan)rightPan.pan.value=.85;leftNoise.connect(leftGain);rightNoise.connect(rightGain);movingNoise.connect(movingGain);if(leftPan){leftGain.connect(leftPan);leftPan.connect(master)}else leftGain.connect(master);if(rightPan){rightGain.connect(rightPan);rightPan.connect(master)}else rightGain.connect(master);if(movingPan){movingGain.connect(movingPan);movingPan.connect(master)}else movingGain.connect(master);leftNoise.start();rightNoise.start();movingNoise.start();audio={ctx,master,panner,leftGain,rightGain,movingGain,movingPan};return audio}
function updateAudio(pan,z){if(!audio)return;const ctx=audio.ctx,p=Math.max(-1,Math.min(1,pan*3.8)),behind=z<-70;if(audio.panner)audio.panner.pan.setTargetAtTime(p,ctx.currentTime,.018);if(audio.movingPan)audio.movingPan.pan.setTargetAtTime(p,ctx.currentTime,.018);const l=Math.max(0,-p),r=Math.max(0,p);audio.leftGain.gain.setTargetAtTime(behind?.006:.010+l*.035,ctx.currentTime,.035);audio.rightGain.gain.setTargetAtTime(behind?.006:.010+r*.035,ctx.currentTime,.035);audio.movingGain.gain.setTargetAtTime(behind?.026:.014+Math.abs(p)*.012,ctx.currentTime,.04)}
function setVoiceMode(on){
  if(!audio)return;
  const t=audio.ctx.currentTime;

  // SpeechSynthesis voice plays outside Web Audio.
  // So we duck brown noise strongly while voice is speaking.
